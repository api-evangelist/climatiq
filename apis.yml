description: >-
  Climatiq provides a developer-first API for carbon accounting and
  emissions calculations. The platform packages a curated emission-factor
  database together with calculation endpoints that turn activity or
  spend data into auditable CO2-equivalent estimates aligned with the
  GHG Protocol. Capabilities span search across the factor catalog,
  generic activity-based estimation, and purpose-built endpoints for
  travel, freight (GLEC), energy, cloud computing, procurement, and the
  EU Carbon Border Adjustment Mechanism. The API is keyed (Bearer
  token) and hosted at api.climatiq.io.
