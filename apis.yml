    description: >-
      The Climatiq API is a single REST surface at api.climatiq.io that
      groups search, estimation, and reference operations under a shared
      API-key (Bearer) auth model. It exposes /data/v1/search for
      discovering emission factors; /data/v1/estimate for activity-based
      estimation; family endpoints under /travel, /freight, /energy,
      /compute, /procurement, /autopilot, /classifications, and /cbam
      for purpose-built calculations; and reference endpoints for
      regions and unit types. All endpoints return CO2e in kilograms
      together with the underlying factor and gas breakdown.
