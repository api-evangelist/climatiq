naftiko: 1.0.0-alpha2
info:
  label: Climatiq API — Energy
  description: 'Climatiq API — Energy. 3 operations. Lead operation: Estimate electricity emissions. Self-contained Naftiko
    capability covering one Climatiq business surface.'
  tags:
  - Climatiq
  - Energy
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLIMATIQ_API_KEY: CLIMATIQ_API_KEY
capability:
  consumes:
  - type: http
    namespace: climatiq-energy
    baseUri: https://api.climatiq.io
    description: Climatiq API — Energy business capability. Self-contained, no shared references.
    resources:
    - name: energy-v1-electricity
      path: /energy/v1/electricity
      operations:
      - name: estimateelectricity
        method: POST
        description: Estimate electricity emissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: energy-v1-fuel
      path: /energy/v1/fuel
      operations:
      - name: estimatefuel
        method: POST
        description: Estimate fuel combustion emissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: energy-v1-heat-and-steam
      path: /energy/v1/heat-and-steam
      operations:
      - name: estimateheatsteam
        method: POST
        description: Estimate heat and steam emissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CLIMATIQ_API_KEY}}'
  exposes:
  - type: rest
    namespace: climatiq-energy-rest
    port: 8080
    description: REST adapter for Climatiq API — Energy. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/energy/v1/electricity
      name: energy-v1-electricity
      description: REST surface for energy-v1-electricity.
      operations:
      - method: POST
        name: estimateelectricity
        description: Estimate electricity emissions
        call: climatiq-energy.estimateelectricity
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/energy/v1/fuel
      name: energy-v1-fuel
      description: REST surface for energy-v1-fuel.
      operations:
      - method: POST
        name: estimatefuel
        description: Estimate fuel combustion emissions
        call: climatiq-energy.estimatefuel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/energy/v1/heat-and-steam
      name: energy-v1-heat-and-steam
      description: REST surface for energy-v1-heat-and-steam.
      operations:
      - method: POST
        name: estimateheatsteam
        description: Estimate heat and steam emissions
        call: climatiq-energy.estimateheatsteam
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: climatiq-energy-mcp
    port: 9090
    transport: http
    description: MCP adapter for Climatiq API — Energy. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: estimate-electricity-emissions
      description: Estimate electricity emissions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: climatiq-energy.estimateelectricity
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: estimate-fuel-combustion-emissions
      description: Estimate fuel combustion emissions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: climatiq-energy.estimatefuel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: estimate-heat-and-steam-emissions
      description: Estimate heat and steam emissions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: climatiq-energy.estimateheatsteam
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
